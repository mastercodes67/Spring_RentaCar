plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.5' // 4.0.0 YERİNE BUNU KULLAN (Stabil)
    id 'io.spring.dependency-management' version '1.1.6'
}

group = 'com.batuhanakpinar'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Boot Temel Paketler
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation' // Validasyon için

    // Veritabanı
    runtimeOnly 'org.postgresql:postgresql'

    // Araçlar
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    // Swagger (Bu sürüm Spring Boot 3.3.x ile tam uyumludur)
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.6.0'

    // Test
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
}